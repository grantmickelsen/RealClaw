name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'k8s/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/realclaw-backend

jobs:
  lint-and-test:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: realclaw_test
          POSTGRES_USER: realclaw
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      run: node ./node_modules/.bin/tsc --noEmit

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://realclaw:testpassword@localhost:5432/realclaw_test
      run: node ./node_modules/.bin/tsx src/db/migrate.ts

    - name: Run unit and integration tests
      env:
        DATABASE_URL: postgresql://realclaw:testpassword@localhost:5432/realclaw_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-for-ci-only-32chars
        NODE_ENV: test
      run: node ./node_modules/.bin/vitest run --reporter=verbose

    - name: Coverage gate (≥80% line coverage)
      env:
        DATABASE_URL: postgresql://realclaw:testpassword@localhost:5432/realclaw_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-for-ci-only-32chars
        NODE_ENV: test
      run: node ./node_modules/.bin/vitest run --coverage --coverage.thresholds.lines=80

  build-and-push:
    name: Build Docker Image & Push
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha,prefix=sha-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

    - name: Inject secrets and deploy
      env:
        IMAGE_TAG: sha-${{ github.sha }}
      run: |
        # Inject secrets (values from GitHub Actions Secrets, never from repo files)
        kubectl create secret generic realclaw-secrets --namespace=realclaw \
          --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET_STAGING }} \
          --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }} \
          --from-literal=REDIS_URL=${{ secrets.REDIS_URL_STAGING }} \
          --from-literal=CLAW_VAULT_MASTER_KEY=${{ secrets.VAULT_MASTER_KEY_STAGING }} \
          --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
          --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_STAGING }} \
          --dry-run=client -o yaml | kubectl apply -f -

        # Apply base manifests
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/redis/
        kubectl apply -f k8s/postgres/

        # Substitute image tag and deploy gateway
        sed "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" k8s/deployment-gateway.yaml | kubectl apply -f -
        kubectl apply -f k8s/service-gateway.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl apply -f k8s/hpa-gateway.yaml
        kubectl apply -f k8s/pdb-gateway.yaml

        # Wait for rollout (5 min timeout)
        kubectl rollout status deployment/gateway --namespace=realclaw --timeout=300s

    - name: Smoke test
      run: |
        sleep 10
        curl -f https://staging-api.realclaw.com/health/live
        curl -f https://staging-api.realclaw.com/health/ready
