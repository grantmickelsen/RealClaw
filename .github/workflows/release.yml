name: Production Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-backend:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

    - name: Inject secrets and deploy
      env:
        IMAGE_TAG: ${{ github.ref_name }}
      run: |
        kubectl create secret generic realclaw-secrets --namespace=realclaw \
          --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET_PRODUCTION }} \
          --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL_PRODUCTION }} \
          --from-literal=REDIS_URL=${{ secrets.REDIS_URL_PRODUCTION }} \
          --from-literal=CLAW_VAULT_MASTER_KEY=${{ secrets.VAULT_MASTER_KEY_PRODUCTION }} \
          --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
          --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_PRODUCTION }} \
          --dry-run=client -o yaml | kubectl apply -f -

        sed "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" k8s/deployment-gateway.yaml | kubectl apply -f -
        kubectl apply -f k8s/service-gateway.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl apply -f k8s/hpa-gateway.yaml
        kubectl apply -f k8s/pdb-gateway.yaml

        # 10 min timeout for production rollout (includes DB migration init container)
        kubectl rollout status deployment/gateway --namespace=realclaw --timeout=600s

    - name: Verify production health
      run: |
        sleep 15
        curl -f https://api.realclaw.com/health/live
        curl -f https://api.realclaw.com/health/ready

  submit-ios:
    name: Submit iOS to App Store
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: Submit iOS build to App Store Connect
      working-directory: apps/mobile
      run: eas submit --platform ios --profile production --non-interactive

  submit-android:
    name: Submit Android to Google Play
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: Submit Android build to Google Play
      working-directory: apps/mobile
      run: eas submit --platform android --profile production --non-interactive
